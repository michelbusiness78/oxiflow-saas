<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1628"/>
      <stop offset="100%" style="stop-color:#1a3570"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Blue accent bar top -->
  <rect x="80" y="80" width="6" height="80" rx="3" fill="url(#accent)"/>

  <!-- Logo icon -->
  <rect x="80" y="200" width="72" height="72" rx="16" fill="#2563EB"/>
  <polygon points="116,216 104,236 116,236 116,256 128,236 116,236" fill="white"/>

  <!-- OxiFlow wordmark -->
  <text x="172" y="256" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#FFFFFF" letter-spacing="-2">Oxi</text>
  <text x="318" y="256" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#60A5FA" letter-spacing="-2">Flow</text>

  <!-- Tagline -->
  <text x="80" y="320" font-family="Arial, sans-serif" font-size="32" font-weight="400" fill="#94A3B8" letter-spacing="0">Gérez votre PME avec la voix</text>

  <!-- Blue underline accent -->
  <rect x="80" y="340" width="480" height="3" rx="2" fill="url(#accent)" opacity="0.6"/>

  <!-- Feature pills -->
  <g font-family="Arial, sans-serif" font-size="18" font-weight="600">
    <!-- Pill 1 -->
    <rect x="80" y="390" width="180" height="42" rx="21" fill="#2563EB" opacity="0.2"/>
    <rect x="80" y="390" width="180" height="42" rx="21" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.4"/>
    <text x="170" y="416" text-anchor="middle" fill="#60A5FA">Devis &amp; Factures</text>

    <!-- Pill 2 -->
    <rect x="280" y="390" width="160" height="42" rx="21" fill="#2563EB" opacity="0.2"/>
    <rect x="280" y="390" width="160" height="42" rx="21" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.4"/>
    <text x="360" y="416" text-anchor="middle" fill="#60A5FA">Pilotage IA</text>

    <!-- Pill 3 -->
    <rect x="460" y="390" width="190" height="42" rx="21" fill="#2563EB" opacity="0.2"/>
    <rect x="460" y="390" width="190" height="42" rx="21" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.4"/>
    <text x="555" y="416" text-anchor="middle" fill="#60A5FA">Gestion Terrain</text>

    <!-- Pill 4 -->
    <rect x="670" y="390" width="130" height="42" rx="21" fill="#2563EB" opacity="0.2"/>
    <rect x="670" y="390" width="130" height="42" rx="21" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.4"/>
    <text x="735" y="416" text-anchor="middle" fill="#60A5FA">RH &amp; Équipe</text>
  </g>

  <!-- CTA badge -->
  <rect x="80" y="460" width="300" height="50" rx="12" fill="#2563EB"/>
  <text x="230" y="491" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Essai gratuit 14 jours</text>

  <!-- Right side decoration -->
  <circle cx="980" cy="315" r="220" fill="#2563EB" opacity="0.04"/>
  <circle cx="980" cy="315" r="160" fill="#2563EB" opacity="0.05"/>
  <circle cx="980" cy="315" r="100" fill="#2563EB" opacity="0.08"/>

  <!-- Domain -->
  <text x="1120" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="20" fill="#475569" letter-spacing="0.5">oxiflow.fr</text>
</svg>
